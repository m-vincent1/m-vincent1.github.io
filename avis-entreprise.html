    <main class="max-w-5xl mx-auto px-4 py-16 space-y-12 flex-1">
      <section class="space-y-4 text-center">
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-primary" data-i18n="avis_title">
          Avis entreprise
        </p>
        <h1 class="text-3xl font-semibold text-slate-900 dark:text-white" data-i18n="avis_subtitle">
          Retours et recommandations des entreprises avec lesquelles j'ai collaboré.
        </h1>
        <!-- Blue decorative line like the reference image -->
        <div class="flex justify-center mt-2">
          <div class="w-16 h-1 rounded-full bg-primary"></div>
        </div>
      </section>

      <section id="avis-list" class="space-y-6">
        <!-- Reviews are injected dynamically from avisData below -->
      </section>
    </main>

    <footer class="border-t border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-slate-900/80">
      <div class="max-w-5xl mx-auto px-4 py-6 text-center text-sm text-slate-500 dark:text-slate-400" data-i18n="footer_text">
        &copy; 2026 Mathis Vincent - Tous droits réservés
      </div>
    </footer>

    <script>
      /* ── AVIS DATA — Easy to edit ── */
      const avisData = [
        {
          date: "2025",
          entreprise: "3Sigmas-Studios",
          responsable: "Responsable de stage",
          lieu: "Budapest",
          etoiles: 5,
          commentaire: "PLACEHOLDER — Remplacez ce texte par le vrai commentaire de l'entreprise 3Sigmas-Studios."
        },
        {
          date: "2023",
          entreprise: "AVA6",
          responsable: "Responsable de stage",
          lieu: "Limonest, Lyon",
          etoiles: 5,
          commentaire: "PLACEHOLDER — Remplacez ce texte par le vrai commentaire de l'entreprise AVA6."
        },
        {
          date: "2021",
          entreprise: "Lycée Les Lazaristes La Salle",
          responsable: "Responsable de stage",
          lieu: "Lyon",
          etoiles: 5,
          commentaire: "PLACEHOLDER — Remplacez ce texte par le vrai commentaire du Lycée Les Lazaristes."
        }
      ];

      function renderAvis() {
        const container = document.getElementById("avis-list");
        if (!container) return;
        container.innerHTML = "";

        avisData.forEach((avis) => {
          const stars = "★".repeat(avis.etoiles) + "☆".repeat(5 - avis.etoiles);

          const article = document.createElement("article");
          article.className =
            "rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/90 dark:bg-slate-800/90 p-6 shadow-sm";

          article.innerHTML = `
            <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between mb-4">
              <div>
                <h2 class="text-xl font-semibold text-slate-900 dark:text-white">${avis.entreprise}</h2>
                <span class="text-sm text-slate-500 dark:text-slate-400">${avis.responsable} — ${avis.lieu}</span>
              </div>
              <span class="text-sm font-medium text-primary">${avis.date}</span>
            </div>
            <div class="text-yellow-400 text-lg mb-3 tracking-wider">${stars}</div>
            <blockquote class="text-slate-600 dark:text-slate-300 italic leading-relaxed border-l-4 border-primary/30 pl-4">
              « ${avis.commentaire} »
            </blockquote>
          `;

          container.appendChild(article);
        });
      }

      document.addEventListener("DOMContentLoaded", renderAvis);
    </script>
  </body>
</html>
